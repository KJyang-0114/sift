rules:
  - id: sift.sql-injection-concat
    message: |
      [SQL Injection] SQL query is built using string concatenation.
      Use parameterized queries instead.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-regex: (execute\(|query\(|Query\(|\.execute\().*\+.*\)
    metadata:
      category: security
      cwe: "CWE-89"

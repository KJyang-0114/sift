rules:
  - id: sift.sql-injection-concat
    message: |
      [SQL Injection] 字串拼接組成 SQL 查詢。
      請使用參數化查詢。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-regex: (execute\(|query\(|Query\(|\.execute\().*\+.*\)
    metadata:
      category: security
      cwe: "CWE-89"

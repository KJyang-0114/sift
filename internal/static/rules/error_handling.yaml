rules:
  - id: sift.error-stack-trace-leak
    message: |
      [Error Handling] Error messages returned directly to the client may leak internal information.
      In production, log errors only and return a generic error response.
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-regex: (\.send\(.*err|\.status\(500\).*send\(|\.json\(\{.*error|return.*err\.Error\(\))
    metadata:
      category: security
      cwe: "CWE-209"

  - id: sift.error-unhandled-rejection
    message: |
      [Reliability] Unhandled Promise rejections may cause the process to crash.
    severity: INFO
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: process.on
    metadata:
      category: reliability

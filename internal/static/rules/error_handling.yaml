rules:
  - id: sift.error-stack-trace-leak
    message: |
      [Error Handling] 錯誤訊息直接回傳客戶端，可能洩漏內部資訊。
      Production 中應僅記錄到 log，回傳 generic error。
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-regex: (\.send\(.*err|\.status\(500\).*send\(|\.json\(\{.*error|return.*err\.Error\(\))
    metadata:
      category: security
      cwe: "CWE-209"

  - id: sift.error-unhandled-rejection
    message: |
      [Reliability] 未捕獲的 Promise rejection 可能導致程序崩潰。
    severity: INFO
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: process.on
    metadata:
      category: reliability

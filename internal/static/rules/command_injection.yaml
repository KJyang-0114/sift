rules:
  - id: sift.command-injection-shell
    message: |
      [Command Injection] Shell command execution detected.
      Avoid shell=True; use argument arrays or strictly validate input.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - php
    patterns:
      - pattern-regex: (os\.system|subprocess|child_process\.exec|shell_exec\()
    metadata:
      category: security
      cwe: "CWE-78"

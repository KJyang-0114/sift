rules:
  - id: sift.command-injection-shell
    message: |
      [Command Injection] 偵測到 Shell 命令執行。
      請避免 shell=True，改用參數陣列或嚴格驗證輸入。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - php
    patterns:
      - pattern-regex: (os\.system|subprocess|child_process\.exec|shell_exec\()
    metadata:
      category: security
      cwe: "CWE-78"

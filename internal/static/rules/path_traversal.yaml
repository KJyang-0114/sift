rules:
  - id: sift.path-traversal-file-op
    message: |
      [Path Traversal] File path is constructed from a variable and may be manipulated with ../ to escape the intended directory.
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - php
    patterns:
      - pattern-regex: (open\(|os\.path\.join\(|fs\.readFile\(|os\.ReadFile\()
    metadata:
      category: security
      cwe: "CWE-22"

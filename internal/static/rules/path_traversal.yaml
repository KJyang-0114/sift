rules:
  - id: sift.path-traversal-file-op
    message: |
      [Path Traversal] 檔案路徑由變數構成，可能被 ../ 繞出預期目錄。
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - php
    patterns:
      - pattern-regex: (open\(|os\.path\.join\(|fs\.readFile\(|os\.ReadFile\()
    metadata:
      category: security
      cwe: "CWE-22"

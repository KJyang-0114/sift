rules:
  - id: sift.prototype-pollution-merge
    message: |
      [Prototype Pollution] Deep-merging user-supplied objects may pollute Object.prototype.
      Attackers can inject __proto__ or constructor properties to tamper with global object behavior.
      Use safe merge utilities (e.g., lodash.merge with safe mode, or Object.assign for shallow copies).
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: |
              Object.assign($TARGET, $REQ.body)
          - pattern: |
              $OBJ = {...$REQ.body, ...$DEFAULTS}
          - pattern: |
              _.merge($TARGET, $REQ.body)
          - pattern: |
              Object.assign($TARGET, $INPUT)
    metadata:
      category: security
      cwe: "CWE-1321"

  - id: sift.prototype-pollution-json-parse
    message: |
      [Prototype Pollution] JSON.parse does not trigger prototype pollution directly, but risks remain if the result is used in recursive merges.
      Filter keys on all external JSON input (strip __proto__, constructor, prototype).
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          $DATA = JSON.parse($REQ.body)
    metadata:
      category: security

rules:
  - id: sift.frontend-dangerouslySetInnerHTML
    message: |
      [XSS] dangerouslySetInnerHTML 直接渲染使用者輸入，可能導致 XSS。
      請使用 DOMPurify 或避免直接插入 HTML。
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: dangerouslySetInnerHTML
    metadata:
      category: security
      cwe: "CWE-79"

  - id: sift.frontend-innerHTML
    message: |
      [XSS] innerHTML/outerHTML/document.write 可能插入惡意腳本。
      請改用 textContent 或先做 sanitize。
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: $EL.innerHTML = $INPUT
          - pattern: document.write($INPUT)
    metadata:
      category: security
      cwe: "CWE-79"

  - id: sift.frontend-eval
    message: |
      [XSS] eval() 可執行任意 JavaScript。
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: eval($INPUT)
    metadata:
      category: security
      cwe: "CWE-95"

  - id: sift.frontend-localStorage
    message: |
      [Security] localStorage 不應存放敏感資料（Token、密碼）。
      請改用 httpOnly Cookie。
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: localStorage.setItem($K, $V)
          - pattern: sessionStorage.setItem($K, $V)
    metadata:
      category: security
      cwe: "CWE-922"

  - id: sift.frontend-open-redirect
    message: |
      [Security] window.location 使用使用者可控的 URL 可能導致 Open Redirect。
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: window.location.href = $U
          - pattern: window.location.replace($U)
    metadata:
      category: security
      cwe: "CWE-601"

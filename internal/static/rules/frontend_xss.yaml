rules:
  - id: sift.frontend-dangerouslySetInnerHTML
    message: |
      [XSS] dangerouslySetInnerHTML renders user input directly, which may lead to XSS.
      Use DOMPurify or avoid injecting raw HTML directly.
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: dangerouslySetInnerHTML
    metadata:
      category: security
      cwe: "CWE-79"

  - id: sift.frontend-innerHTML
    message: |
      [XSS] innerHTML/outerHTML/document.write may inject malicious scripts.
      Use textContent instead or sanitize input first.
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: $EL.innerHTML = $INPUT
          - pattern: document.write($INPUT)
    metadata:
      category: security
      cwe: "CWE-79"

  - id: sift.frontend-eval
    message: |
      [XSS] eval() can execute arbitrary JavaScript.
    severity: ERROR
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: eval($INPUT)
    metadata:
      category: security
      cwe: "CWE-95"

  - id: sift.frontend-localStorage
    message: |
      [Security] localStorage should not store sensitive data (tokens, passwords).
      Use httpOnly cookies instead.
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: localStorage.setItem($K, $V)
          - pattern: sessionStorage.setItem($K, $V)
    metadata:
      category: security
      cwe: "CWE-922"

  - id: sift.frontend-open-redirect
    message: |
      [Security] window.location using a user-controllable URL may lead to open redirect.
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: window.location.href = $U
          - pattern: window.location.replace($U)
    metadata:
      category: security
      cwe: "CWE-601"

rules:
  - id: sift.graphql-introspection-enabled
    message: |
      [GraphQL Security] GraphQL introspection is enabled in production.
      Attackers can enumerate all available queries and fields via introspection.
      Disable introspection in production environments.
    severity: WARNING
    languages:
      - javascript
      - typescript
      - python
    patterns:
      - pattern-either:
          - pattern: |
              introspection: true
          - pattern: |
              graphqlHTTP({schema: $SCHEMA})
    metadata:
      category: security
      cwe: "CWE-200"

  - id: sift.graphql-depth-limit
    message: |
      [GraphQL Security] No query depth limit is set; attackers can launch DoS attacks via deeply nested queries.
      Use graphql-depth-limit or graphql-query-complexity to limit query complexity.
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern-either:
          - pattern: |
              graphqlExpress($SCHEMA)
          - pattern: |
              ApolloServer({schema: $SCHEMA})
    metadata:
      category: security
      cwe: "CWE-400"

  - id: sift.graphql-batch-attack
    message: |
      [GraphQL Security] Batch request count is not limited; attackers can send many aliased queries to bypass rate limiting.
    severity: WARNING
    languages:
      - javascript
      - typescript
    patterns:
      - pattern: |
          batch: true
    metadata:
      category: security

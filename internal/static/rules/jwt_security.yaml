rules:
  - id: sift.jwt-none-algorithm
    message: |
      [JWT Security] JWT verification algorithm is not explicitly enforced; attackers may use the "none" algorithm to bypass signature verification.
      Explicitly specify the algorithms parameter in jwt.verify().
    severity: ERROR
    languages:
      - javascript
      - typescript
      - python
    patterns:
      - pattern-either:
          - pattern: jwt.verify($TOKEN, $SECRET)
          - pattern: jwt.decode($TOKEN, $SECRET)
          - pattern: jwt.decode($TOKEN, verify=True)
    metadata:
      category: security
      cwe: "CWE-347"

  - id: sift.jwt-hardcoded-secret
    message: |
      [JWT Security] JWT secret is hardcoded in the source code.
      Use environment variables and ensure the secret is sufficiently strong (>= 256 bits).
    severity: ERROR
    languages:
      - javascript
      - typescript
      - python
      - go
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "$SECRET")
          - pattern: jwt.verify($TOKEN, "$SECRET")
    metadata:
      category: security
      cwe: "CWE-798"

  - id: sift.jwt-no-expiration
    message: |
      [JWT Security] JWT token has no expiration time (exp) set.
      A non-expiring token, if leaked, creates a permanent security vulnerability.
    severity: WARNING
    languages:
      - javascript
      - typescript
      - python
      - go
    patterns:
      - pattern: jwt.sign($PAYLOAD, $SECRET)
    metadata:
      category: security

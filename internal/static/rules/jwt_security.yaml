rules:
  - id: sift.jwt-none-algorithm
    message: |
      [JWT Security] 未強制指定 JWT 驗證演算法，攻擊者可能使用 "none" 演算法繞過簽章驗證。
      請在 jwt.verify() 中明確指定 algorithms 參數。
    severity: ERROR
    languages:
      - javascript
      - typescript
      - python
    patterns:
      - pattern-either:
          - pattern: jwt.verify($TOKEN, $SECRET)
          - pattern: jwt.decode($TOKEN, $SECRET)
          - pattern: jwt.decode($TOKEN, verify=True)
    metadata:
      category: security
      cwe: "CWE-347"

  - id: sift.jwt-hardcoded-secret
    message: |
      [JWT Security] JWT Secret 硬編碼在程式碼中。
      請使用環境變數，並確保 Secret 強度足夠（>=256 bits）。
    severity: ERROR
    languages:
      - javascript
      - typescript
      - python
      - go
    patterns:
      - pattern-either:
          - pattern: jwt.sign($PAYLOAD, "$SECRET")
          - pattern: jwt.verify($TOKEN, "$SECRET")
    metadata:
      category: security
      cwe: "CWE-798"

  - id: sift.jwt-no-expiration
    message: |
      [JWT Security] JWT Token 未設定過期時間 (exp)。
      永不失效的 Token 若外洩將造成永久性安全漏洞。
    severity: WARNING
    languages:
      - javascript
      - typescript
      - python
      - go
    patterns:
      - pattern: jwt.sign($PAYLOAD, $SECRET)
    metadata:
      category: security

rules:
  - id: sift.file-upload-no-validation
    message: |
      [File Upload Security] File upload does not validate file type, size, or content.
      Attackers can upload web shells or malicious executables.
      Validate MIME type, enforce a file extension allowlist, and set a file size limit.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - php
    patterns:
      - pattern-either:
          - pattern: |
              $FILE.save($PATH)
          - pattern: |
              fs.writeFile($PATH, $FILE.buffer)
          - pattern: |
              move_uploaded_file($TMP, $DEST)
          - pattern: |
              shutil.copy($SRC, $DST)
    metadata:
      category: security
      cwe: "CWE-434"
      owasp: "A03:2021 - Injection"

  - id: sift.file-upload-user-path
    message: |
      [File Upload Security] Upload file path is controlled by user input.
      Attackers can exploit path traversal to overwrite system files.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - php
    patterns:
      - pattern-either:
          - pattern: |
              $FILE.save($UPLOAD_DIR + $REQ.body.$FIELD)
          - pattern: |
              $FILE.save($REQ.body.$FIELD)
    metadata:
      category: security
      cwe: "CWE-22"

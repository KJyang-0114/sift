rules:
  - id: sift.config-cors-wildcard
    message: |
      [Config] CORS 設定為 wildcard (*)，允許任意來源。
      請指定明確的允許來源清單。
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-regex: (Access-Control-Allow-Origin:\s*\*|cors\(\{origin:\s*'\*')
    metadata:
      category: config-security
      cwe: "CWE-942"

  - id: sift.config-env-file
    message: |
      [Config] .env 檔案可能被部署時暴露。
    severity: MEDIUM
    languages:
      - python
      - javascript
    patterns:
      - pattern-regex: \.env
    metadata:
      category: config-security

  - id: sift.config-debug-mode
    message: |
      [Config] DEBUG 模式可能啟用在 Production。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
    patterns:
      - pattern-regex: (DEBUG\s*=\s*True|debug=True|NODE_ENV\s*=\s*development)
    metadata:
      category: security
      cwe: "CWE-489"

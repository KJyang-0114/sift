rules:
  - id: sift.config-cors-wildcard
    message: |
      [Config] CORS is set to wildcard (*), allowing any origin.
      Specify an explicit allowlist of origins.
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-regex: (Access-Control-Allow-Origin:\s*\*|cors\(\{origin:\s*'\*')
    metadata:
      category: config-security
      cwe: "CWE-942"

  - id: sift.config-env-file
    message: |
      [Config] .env file may be exposed during deployment.
    severity: MEDIUM
    languages:
      - python
      - javascript
    patterns:
      - pattern-regex: \.env
    metadata:
      category: config-security

  - id: sift.config-debug-mode
    message: |
      [Config] DEBUG mode may be enabled in production.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
    patterns:
      - pattern-regex: (DEBUG\s*=\s*True|debug=True|NODE_ENV\s*=\s*development)
    metadata:
      category: security
      cwe: "CWE-489"

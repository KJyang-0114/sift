rules:
  - id: sift.nosql-injection-mongo
    message: |
      [NoSQL Injection] User input is passed directly into a MongoDB query, which may bypass authentication or exfiltrate data.
      Use $eq to explicitly specify the comparison operator, or use Mongoose schema validation.
    severity: ERROR
    languages:
      - javascript
      - typescript
      - python
    patterns:
      - pattern-either:
          - pattern: |
              $COLLECTION.find({$KEY: $REQ.body.$FIELD})
          - pattern: |
              $COLLECTION.findOne({$KEY: $REQ.query.$FIELD})
          - pattern: |
              $COLLECTION.findOne({$KEY: $REQ.params.$FIELD})
          - pattern: |
              $DB.collection($NAME).find({$KEY: $INPUT})
          - pattern: |
              $COLLECTION.find({$KEY: {$NE: $VALUE}})
          - pattern: |
              $COLLECTION.update({$KEY: $INPUT}, $UPDATE)
          - pattern: |
              $COLLECTION.deleteMany({$KEY: $INPUT})
    metadata:
      category: security
      cwe: "CWE-943"
      owasp: "A03:2021 - Injection"

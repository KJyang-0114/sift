rules:
  - id: sift.rate-limit-missing
    message: |
      [公網安全] 未檢測到 Rate Limiting 機制。
      部署公網請加入 express-rate-limit / django-ratelimit。
    severity: INFO
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-regex: (rateLimit|RateLimiter|express-rate-limit|django-ratelimit)
    metadata:
      category: deployment-security

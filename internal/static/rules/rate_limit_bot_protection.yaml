rules:
  - id: sift.rate-limit-missing
    message: |
      [Public-Facing Deployment] No rate limiting mechanism detected.
      Add express-rate-limit / django-ratelimit when deploying to the public internet.
    severity: INFO
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-regex: (rateLimit|RateLimiter|express-rate-limit|django-ratelimit)
    metadata:
      category: deployment-security

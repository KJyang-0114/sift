rules:
  - id: sift.prompt-injection-risk
    message: |
      [Prompt Injection] 使用者輸入直接傳入 LLM API 調用。
      請在 prompt 中分離使用者輸入與系統指令。
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-regex: (\.chat\.completions\.create|\.messages\.create|\.invoke|\.run|\.generate\()
    metadata:
      category: security
      cwe: "CWE-77"
      owasp: "LLM01:2025 - Prompt Injection"

rules:
  - id: sift.prompt-injection-risk
    message: |
      [Prompt Injection] User input is passed directly to an LLM API call.
      Separate user input from system instructions in the prompt.
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-regex: (\.chat\.completions\.create|\.messages\.create|\.invoke|\.run|\.generate\()
    metadata:
      category: security
      cwe: "CWE-77"
      owasp: "LLM01:2025 - Prompt Injection"

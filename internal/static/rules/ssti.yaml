rules:
  - id: sift.ssti-server-template-injection
    message: |
      [SSTI] User input is passed to a template engine, which may lead to Server-Side Template Injection.
      Attackers can execute arbitrary code. Use sandbox mode or treat input as data rather than as a template.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-either:
          - pattern: |
              $TEMPLATE.render($INPUT)
          - pattern: |
              $ENV.from_string($INPUT)
          - pattern: |
              $JINJA2.from_string($INPUT)
          - pattern: |
              nunjucks.renderString($INPUT)
          - pattern: |
              ejs.render($INPUT)
          - pattern: |
              $TEMPLATE.Execute($WRITER, $INPUT)
    metadata:
      category: security
      cwe: "CWE-1336"

  - id: sift.ssti-format-string
    message: |
      [Format String Attack] Using .format() or % to format strings containing user input.
      This may lead to information disclosure in certain Python versions.
    severity: WARNING
    languages:
      - python
    patterns:
      - pattern-either:
          - pattern: |
              $STRING.format($INPUT)
          - pattern: |
              $STRING % $INPUT
    metadata:
      category: security
      cwe: "CWE-134"

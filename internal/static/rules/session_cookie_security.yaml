rules:
  - id: sift.session-cookie-no-httponly
    message: |
      [Session Security] Cookie does not set httpOnly (XSS can steal the token).
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - php
    patterns:
      - pattern-regex: (res\.cookie\(|set_cookie\(|SetCookie\()
    metadata:
      category: security
      cwe: "CWE-614"

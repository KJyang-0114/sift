rules:
  - id: sift.ssrf-http-request
    message: |
      [SSRF] User input is passed directly to an HTTP request URL, which may lead to Server-Side Request Forgery.
      Validate that the target URL is in an allowlist, or block internal IPs (127.0.0.1, 10.x, 192.168.x).
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-either:
          - pattern: requests.get($INPUT)
          - pattern: requests.post($URL, ...)
          - pattern: axios.get($URL)
          - pattern: axios.post($URL)
          - pattern: http.Get($URL)
          - pattern: fetch($URL)
          - pattern: urllib.request.urlopen($URL)
          - pattern: $HTTP.get($URL)
    metadata:
      category: security
      cwe: "CWE-918"
      owasp: "A10:2021 - Server-Side Request Forgery"

  - id: sift.ssrf-url-construction
    message: |
      [SSRF] URL is constructed from user input; attackers can control the request target.
    severity: WARNING
    languages:
      - python
      - javascript
      - typescript
      - go
    patterns:
      - pattern-either:
          - pattern: |
              requests.get("..." + $VAR)
          - pattern: |
              $URL = "..." + $INPUT
              ...
              requests.get($URL)
    metadata:
      category: security
      cwe: "CWE-918"

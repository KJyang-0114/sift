rules:
  - id: sift.xss-reflected-output
    message: |
      [XSS] 使用者輸入直接寫入 HTTP 回應。
      請做 HTML Entity 編碼或使用安全的模板引擎。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - php
      - ruby
    patterns:
      - pattern-regex: (\.send\(.*req\.|echo \$_GET|echo \$_POST|HttpResponse\(.*request\.|innerHTML\s*=)
    metadata:
      category: security
      cwe: "CWE-79"
      owasp: "A03:2021 - Injection"

rules:
  - id: sift.insecure-deserialization
    message: |
      [Insecure Deserialization] Use of unsafe deserialization functions detected.
      pickle/yaml.load can execute arbitrary code; use safe alternatives instead (json, yaml.safe_load).
    severity: ERROR
    languages:
      - python
      - ruby
      - php
      - java
      - javascript
    patterns:
      - pattern-either:
          - pattern: pickle.loads($INPUT)
          - pattern: pickle.load($INPUT)
          - pattern: yaml.load($INPUT)
          - pattern: eval($INPUT)
          - pattern: exec($INPUT)
          - pattern: eval($INPUT)
          - pattern: unserialize($INPUT)
          - pattern: YAML.load($INPUT)
          - pattern: Marshal.load($INPUT)
          - pattern: eval($INPUT)
          - pattern: $OBJECT.readObject()
    metadata:
      category: security
      cwe: "CWE-502"
      owasp: "A08:2021 - Software and Data Integrity Failures"

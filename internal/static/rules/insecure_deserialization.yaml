rules:
  - id: sift.insecure-deserialization
    message: |
      [Insecure Deserialization] 使用了不安全的反序列化函數。
      pickle/yaml.load 可以執行任意程式碼，請改用安全的替代方案 (json, yaml.safe_load)。
    severity: ERROR
    languages:
      - python
      - ruby
      - php
      - java
      - javascript
    patterns:
      - pattern-either:
          # Python
          - pattern: pickle.loads($INPUT)
          - pattern: pickle.load($INPUT)
          - pattern: yaml.load($INPUT)
          - pattern: eval($INPUT)
          - pattern: exec($INPUT)
          # JavaScript
          - pattern: eval($INPUT)
          # PHP
          - pattern: unserialize($INPUT)
          # Ruby
          - pattern: YAML.load($INPUT)
          - pattern: Marshal.load($INPUT)
          - pattern: eval($INPUT)
          # Java
          - pattern: $OBJECT.readObject()
    metadata:
      category: security
      cwe: "CWE-502"
      owasp: "A08:2021 - Software and Data Integrity Failures"

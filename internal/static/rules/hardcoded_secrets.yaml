rules:
  - id: sift.hardcoded-secret
    message: |
      [Hardcoded Secret] 原始碼中包含疑似 API Key / Token 的硬編碼機密。
      請改用環境變數或 Secrets Manager。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - php
    patterns:
      - pattern-regex: (sk-(live|test|ant)-[a-zA-Z0-9_-]{20,})
  - id: sift.hardcoded-secret-aws
    message: |
      [Hardcoded Secret] 原始碼中包含疑似 AWS Access Key 的硬編碼機密。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-regex: AKIA[0-9A-Z]{16}
  - id: sift.hardcoded-secret-private-key
    message: |
      [Hardcoded Secret] 原始碼中包含 Private Key。
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - php
    patterns:
      - pattern-regex: -----BEGIN (RSA |EC )?PRIVATE KEY-----

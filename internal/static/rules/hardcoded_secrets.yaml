rules:
  - id: sift.hardcoded-secret
    message: |
      [Hardcoded Secret] 原始碼中包含疑似 API Key / Token 的硬編碼機密。
      請改用環境變數或 Secrets Manager。
    severity: ERROR
    patterns:
      - pattern-either:
          # API Key patterns
          - pattern-regex: (sk-(live|test|ant)-[a-zA-Z0-9_-]{20,})
          - pattern-regex: (api_key|apikey|api_secret|secret_key|SECRET_KEY)\s*[:=]\s*["'][^"']{10,}["']
          - pattern-regex: (ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}
          - pattern-regex: AKIA[0-9A-Z]{16}
          - pattern-regex: (-----BEGIN (RSA |EC )?PRIVATE KEY-----)
          - pattern-regex: (ya29\.[0-9A-Za-z\-_]+)
          - pattern-regex: (eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,})
    paths:
      include:
        - "*.py"
        - "*.js"
        - "*.ts"
        - "*.tsx"
        - "*.go"
        - "*.java"
        - "*.rb"
        - "*.php"
        - "*.yaml"
        - "*.yml"
        - "*.toml"
        - "*.env"
        - "*.cfg"
    metadata:
      category: security
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"

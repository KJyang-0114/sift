rules:
  - id: sift.hardcoded-secret
    message: |
      [Hardcoded Secret] Source code contains a hardcoded secret resembling an API key or token.
      Use environment variables or a secrets manager instead.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - php
    patterns:
      - pattern-regex: (sk-(live|test|ant)-[a-zA-Z0-9_-]{20,})
  - id: sift.hardcoded-secret-aws
    message: |
      [Hardcoded Secret] Source code contains a hardcoded secret resembling an AWS access key.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
    patterns:
      - pattern-regex: AKIA[0-9A-Z]{16}
  - id: sift.hardcoded-secret-private-key
    message: |
      [Hardcoded Secret] Source code contains a private key.
    severity: ERROR
    languages:
      - python
      - javascript
      - typescript
      - go
      - java
      - ruby
      - php
    patterns:
      - pattern-regex: -----BEGIN (RSA |EC )?PRIVATE KEY-----

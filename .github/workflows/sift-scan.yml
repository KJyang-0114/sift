name: Sift Security Scan
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sift-scan:
    name: Sift Code Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Python (for semgrep)
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install semgrep
        run: pip3 install semgrep

      - name: Build and run Sift
        env:
          SIFT_LLM_PROVIDER: offline
        run: |
          go build -o sift ./cmd/sift/
          ./sift scan . --format terminal
          ./sift scan . --format sarif > sift-results.sarif
          echo "Scan complete, findings saved to sift-results.sarif"

      - name: Upload SARIF to GitHub
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sift-results.sarif
          category: sift
